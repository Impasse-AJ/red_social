security:
    # Proveedores de usuarios que pueden usar los firewalls:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario  # Clase correcta
                property: email    
    
    # Hasheo de las claves de los usuarios
    password_hashers:
        App\Entity\Usuario:
            algorithm: auto  # Symfony elegirá el mejor algoritmo automáticamente
    
    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: ctrl_login
                check_path: ctrl_login
                default_target_path: ctrl_home
                username_parameter: email  # <- Asegurar que aquí usamos 'email'
                enable_csrf: true  # Protección CSRF en el formulario de login
            logout:
                path: ctrl_logout
                target: ctrl_login
            # Límite de intentos de login por usuario e IP (anti fuerza bruta)
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    # Control de acceso: todo requiere sesión salvo las rutas públicas
    access_control:
        - { path: ^/(login|registro|activar|recuperar-password|procesar-recuperacion|restablecer-password|procesar-restablecimiento), roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }  # Landing page pública (futura)
        - { path: ^/, roles: ROLE_USER }




